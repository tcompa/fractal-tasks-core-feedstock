{% set version = "2.0.1" %}
{% set python_min = "3.11.0" %}

package:
  name: fractal-tasks-core
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/fractal-tasks-core/fractal_tasks_core-{{ version }}.tar.gz
  sha256: 8a6b2e148ea87223a5307c11a6d0472cde940f743c79d20ec63dbb608e4844b4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.0.0
    - dask-core >=2023.1.0,<2025.11.0
    - pydantic >2.11.0,<=2.12.0
    - ngio >=0.5.8,<0.6.0
    - fractal-tasks-utils >=0.1.3,<0.2.0
    - fractal-task-tools >=0.4.0,<0.5.0
    - scikit-image >=0.19
    - image-registration >=0.2.10

test:
  imports:
    - fractal_tasks_core
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/fractal-analytics-platform/fractal-tasks-core
  summary: Reference task package for the Fractal analytics platform
  doc_url: https://fractal-analytics-platform.github.io/fractal-tasks-core
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tcompa
    - jluethi
    - lorenzocerrone
